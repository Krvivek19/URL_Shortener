# ── Render Blueprint ──
# One-click deployment for Render.com
# This file defines all services (API, PostgreSQL, Redis) in a single config.
#
# To use:
# 1. Push to GitHub
# 2. In Render Dashboard → "New" → "Blueprint"
# 3. Connect your repo
# 4. Render automatically creates all services!

services:
  # ── API Service ────────────────────────────────────────
  - type: web
    name: url-shortener-api
    runtime: docker
    repo: https://github.com/YOUR_USERNAME/url-shortener  # REPLACE THIS
    region: oregon
    plan: free
    branch: main
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: url-shortener-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: url-shortener-redis
          type: redis
          property: connectionString
      - key: BASE_URL
        value: https://url-shortener-api.onrender.com  # Update after deployment
      - key: CACHE_TTL
        value: 3600
      - key: RATE_LIMIT
        value: 10/minute
      - key: SHORT_CODE_LENGTH
        value: 6

# ── PostgreSQL Database ─────────────────────────────────
databases:
  - name: url-shortener-db
    databaseName: urlshortener
    user: urlshortener_user
    region: oregon
    plan: free

# ── Redis Cache ─────────────────────────────────────────
  - name: url-shortener-redis
    region: oregon
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []  # Allow connections from your services
